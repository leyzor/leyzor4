<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leyzor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%; font-family: 'Inter', sans-serif;
            background: #000; color: #fff; overflow: hidden;
        }
        .bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: 0; filter: brightness(0.28) saturate(0.6); object-fit: cover;
        }
        #enter-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: flex-end; justify-content: flex-start;
            padding: 0 0 120px 48px; cursor: pointer; transition: opacity 0.8s ease;
        }
        #typewriter { font-size: clamp(18px,4vw,26px); font-weight: 300; color: rgba(255,255,255,0.7); letter-spacing: 0.02em; }
        #cursor {
            display: inline-block; width: 2px; height: 1.1em;
            background: rgba(255,255,255,0.7); margin-left: 3px;
            vertical-align: middle; animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        #main-content {
            position: relative; z-index: 10; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.8s ease; pointer-events: none;
        }
        #main-content.visible { opacity: 1; pointer-events: all; }
        .card {
            width: min(380px, 92vw);
            background: rgba(15,15,15,0.88);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
            transform: translateY(30px);
            transition: transform 0.8s cubic-bezier(0.16,1,0.3,1);
        }
        #main-content.visible .card { transform: translateY(0); }
        .banner { width: 100%; height: 100px; background: #e8e8e8; }
        .avatar-zone {
            position: relative; padding: 0 20px;
            margin-top: -44px; margin-bottom: 10px;
            display: flex; align-items: flex-end; justify-content: space-between;
        }
        /* Décoration Mirage */
        .avatar-decoration { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
        .avatar-decoration::before {
            content: ''; position: absolute; inset: -5px; border-radius: 50%;
            background: conic-gradient(#f5c842 0%,#e8a020 15%,#ffd966 30%,#c87d10 45%,#f5c842 60%,#fff5a0 75%,#e8a020 90%,#f5c842 100%);
            animation: rotateMirage 3s linear infinite; z-index: 1;
        }
        .avatar-decoration::after {
            content: ''; position: absolute; inset: -10px; border-radius: 50%;
            background: radial-gradient(circle, rgba(180,100,255,0.25) 0%, transparent 70%);
            animation: pulseHalo 2s ease-in-out infinite alternate; z-index: 0;
        }
        @keyframes rotateMirage { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes pulseHalo { from{opacity:0.4;transform:scale(1)} to{opacity:0.9;transform:scale(1.08)} }
        .avatar-bg { position: absolute; inset: 2px; border-radius: 50%; background: rgba(15,15,15,0.95); z-index: 2; }
        .avatar-bg img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
        .status-dot-avatar {
            position: absolute; bottom: 4px; right: 4px;
            width: 14px; height: 14px; border-radius: 50%;
            border: 3px solid rgba(15,15,15,0.95); background: #747f8d; z-index: 3;
        }
        .status-dot-avatar.online{background:#3ba55d} .status-dot-avatar.idle{background:#faa61a}
        .status-dot-avatar.dnd{background:#ed4245} .status-dot-avatar.offline{background:#747f8d}
        .status-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
            margin-bottom: 6px; font-size: 12px; font-weight: 500;
        }
        .status-dot-badge { width: 8px; height: 8px; border-radius: 50%; background: #747f8d; flex-shrink: 0; }
        .status-dot-badge.online{background:#3ba55d} .status-dot-badge.idle{background:#faa61a}
        .status-dot-badge.dnd{background:#ed4245} .status-dot-badge.offline{background:#747f8d}
        .card-body { padding: 0 20px 18px; }
        .username { font-size: 21px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
        .handle { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 2px; }
        .member-since {
            display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
            font-size: 11px; color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px; padding: 3px 8px;
        }
        .activity {
            margin-top: 12px; padding: 9px 13px;
            background: rgba(255,255,255,0.04); border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 12px; color: rgba(255,255,255,0.5); font-style: italic;
            display: flex; align-items: center; gap: 8px;
        }
        .activity.hidden { display: none; }
        .spotify-row {
            margin-top: 8px; padding: 9px 13px;
            background: rgba(30,215,96,0.06); border: 1px solid rgba(30,215,96,0.15);
            border-radius: 10px; display: flex; align-items: center; gap: 10px;
        }
        .spotify-row.hidden { display: none; }
        .spotify-text { overflow: hidden; }
        .spotify-song { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .spotify-artist { font-size: 11px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }
        .socials { display: flex; justify-content: center; gap: 16px; }
        .social-btn {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: rgba(255,255,255,0.6);
            transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.2s;
        }
        .social-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: #fff; transform: translateY(-2px); }
        .social-btn svg { width: 19px; height: 19px; }
    </style>
</head>
<body>
    <video id="bg-video" class="bg-video" loop playsinline muted>
        <source src="video.mp4" type="video/mp4">
    </video>
    <audio id="bg-music" loop>
        <source src="musique.mp3" type="audio/mpeg">
    </audio>

    <div id="enter-screen">
        <div><span id="typewriter"></span><span id="cursor"></span></div>
    </div>

    <div id="main-content">
        <div class="card">
            <div class="banner"></div>
            <div class="avatar-zone">
                <div class="avatar-decoration">
                    <div class="avatar-bg">
                        <img id="avatar-img" src="" alt="avatar">
                    </div>
                    <span class="status-dot-avatar offline" id="status-dot-avatar"></span>
                </div>
                <div class="status-badge">
                    <span class="status-dot-badge offline" id="status-dot-badge"></span>
                    <span id="status-text">Offline</span>
                </div>
            </div>
            <div class="card-body">
                <div class="username">leyzor</div>
                <div class="handle">@creditagricall</div>
                <div class="member-since">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
                    Member since April 20, 2016
                </div>
                <div class="activity hidden" id="activity-row">
                    <span id="activity-icon">▶</span>
                    <span id="activity-text"></span>
                </div>
                <div class="spotify-row hidden" id="spotify-row">
                    <svg width="20" height="20" viewBox="0 0 168 168" fill="none" style="flex-shrink:0">
                        <circle cx="84" cy="84" r="84" fill="#1ED760"/>
                        <path d="M120.8 117.3c-1.6 2.6-5 3.4-7.6 1.8-20.8-12.7-47-15.6-77.8-8.5-3 .7-6-1.2-6.7-4.1-.7-3 1.2-6 4.1-6.7 33.7-7.7 62.6-4.4 85.9 9.9 2.6 1.6 3.4 5 1.8 7.6zm10.2-22.7c-2 3.2-6.2 4.2-9.4 2.2-23.8-14.6-60-18.8-88.1-10.3-3.4 1-7-1-8-4.4s1-7 4.4-8C63.3 64.1 103 68.8 130 85.4c3.2 2 4.2 6.2 2.2 9.4zM131.7 72c-28.6-17-75.7-18.6-103-10.3-4.1 1.2-8.4-1.1-9.6-5.2-1.2-4.1 1.1-8.4 5.2-9.6 31.4-9.5 83.6-7.7 116.6 11.9 3.7 2.2 4.9 7 2.7 10.7-2.2 3.7-7 4.9-10.7 2.7z" fill="#000"/>
                    </svg>
                    <div class="spotify-text">
                        <div class="spotify-song" id="spotify-song">—</div>
                        <div class="spotify-artist" id="spotify-artist">—</div>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="socials">
                    <a class="social-btn" href="https://open.spotify.com" target="_blank" title="Spotify">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
                    </a>
                    <a class="social-btn" href="https://discord.com/users/172383880677031938" target="_blank" title="Discord">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.08.11 18.1.128 18.115a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                    </a>
                    <a class="social-btn" href="https://instagram.com/ezan7a" target="_blank" title="Instagram">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DISCORD_ID = '172383880677031938';
        const TEXT = 'click to dive into my world';
        const enterScreen = document.getElementById('enter-screen');
        const mainContent = document.getElementById('main-content');
        const bgVideo = document.getElementById('bg-video');
        const bgMusic = document.getElementById('bg-music');

        const typeEl = document.getElementById('typewriter');
        let i = 0, typed = false;
        function type() {
            if (i < TEXT.length) { typeEl.textContent += TEXT[i++]; setTimeout(type, 55 + Math.random() * 40); }
            else typed = true;
        }
        setTimeout(type, 600);

        enterScreen.addEventListener('click', () => {
            bgVideo.play();
            bgMusic.volume = 0.45;
            bgMusic.play().catch(() => {});
            enterScreen.style.opacity = '0';
            enterScreen.style.pointerEvents = 'none';
            setTimeout(() => { enterScreen.style.display = 'none'; mainContent.classList.add('visible'); }, 700);
        });

        async function fetchDiscord() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const json = await res.json();
                if (!json.success) return;
                const d = json.data, u = d.discord_user;
                const hash = u.avatar;
                const ext = hash?.startsWith('a_') ? 'gif' : 'png';
                const avatarUrl = hash ? `https://cdn.discordapp.com/avatars/${u.id}/${hash}.${ext}?size=128` : `https://cdn.discordapp.com/embed/avatars/${(parseInt(u.id) >> 22) % 6}.png`;
                document.getElementById('avatar-img').src = avatarUrl;
                const status = d.discord_status || 'offline';
                document.getElementById('status-dot-avatar').className = `status-dot-avatar ${status}`;
                document.getElementById('status-dot-badge').className = `status-dot-badge ${status}`;
                const labels = { online: 'Online', idle: 'Idle', dnd: 'Do not disturb', offline: 'Offline' };
                document.getElementById('status-text').textContent = labels[status];
                const activities = d.activities || [];
                const custom = activities.find(a => a.type === 4);
                const other = activities.find(a => a.type !== 4 && a.type !== 2);
                const actRow = document.getElementById('activity-row');
                if (custom?.state) {
                    document.getElementById('activity-icon').textContent = '💬';
                    document.getElementById('activity-text').textContent = custom.state;
                    actRow.classList.remove('hidden');
                } else if (other) {
                    const icons = { 0: '🎮', 1: '📡', 3: '📺' };
                    document.getElementById('activity-icon').textContent = icons[other.type] || '▶';
                    document.getElementById('activity-text').textContent = other.name;
                    actRow.classList.remove('hidden');
                } else { actRow.classList.add('hidden'); }
                const spRow = document.getElementById('spotify-row');
                if (d.spotify?.song) {
                    document.getElementById('spotify-song').textContent = d.spotify.song;
                    document.getElementById('spotify-artist').textContent = d.spotify.artist;
                    spRow.classList.remove('hidden');
                } else { spRow.classList.add('hidden'); }
            } catch(e) {}
        }
        fetchDiscord();
        setInterval(fetchDiscord, 20000);
    </script>
</body>
</html>
